version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # 如果需要单独前端服务，可以取消注释下面配置（需要先编译前端到 build 目录）
