# Investment Research System - Core Configuration

# Global Settings
version: "0.1.0"
project: "investment_research"
description: "Investment Research System for Small Investors"

# Data Configuration
data:
  sources:
    macro:
      primary: "akshare"
      fallback: "tushare"
    research:
      parser: "pdfplumber"
    financial:
      provider: "tushare"
      
  storage:
    local: "./data"
    remote: "s3://investment-research-data"
    cache_expiry: 86400  # 1 day in seconds

# Model Configuration
models:
  macro:
    type: "arima"
    forecast_horizon: 12
    confidence_level: 0.95
    
  research:
    extraction_method: "nlp"
    key_term_weighting: "tf-idf"
    
  estimation:
    parameter_estimation: "maximum_likelihood"
    confidence_interval: 0.95
    
  decision:
    risk_tolerance: "moderate"
    portfolio_optimization: "sharpe_ratio"
    rebalancing_frequency: "monthly"

# Risk Management
risk:
  levels:
    low:
      max_volatility: 0.15
      max_drawdown: 0.15
    moderate:
      max_volatility: 0.25
      max_drawdown: 0.25
    high:
      max_volatility: 0.35
      max_drawdown: 0.35

# Investment Constraints
constraints:
  minimum_weight: 0.01
  maximum_weight: 0.25
  max_assets: 20
  sector_constraints:
    tech: [0.05, 0.3]
    finance: [0.1, 0.4]
    consumer: [0.1, 0.4]
    healthcare: [0.05, 0.25]
    other: [0.1, 0.4]

# Notifications
notifications:
  email:
    enabled: false
    template: "email_template.jinja"
    
  wechat:
    enabled: false
    app_id: "your_wechat_app_id"
    app_secret: "your_wechat_secret"
    
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/..."

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "logs/investment_research.log"
  rotation: "daily"
  retention: "30 days"

# Performance Monitoring
monitoring:
  enabled: false
  statsd_host: "localhost"
  statsd_port: 8125
  namespace: "investment_research"

# API Configuration
api:
  enabled: false
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_allowed_origins:
    - "http://localhost:3000"
    - "https://investment-research.com"

# Testing Configuration
testing:
  enabled: false
  coverage: false
  report_directory: "tests/reports"
